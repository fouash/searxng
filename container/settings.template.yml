# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  default_lang: "ar-SA"
  safe_search: 0
  formats:
    - html
    - json
  languages:
    - "ar-SA"
    - "ar"
    - "en-US"
    - "all"

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

ui:
  default_locale: "ar"
  default_theme: simple

engines:
  # Custom domain discovery engines (Saudi Arabia priority)
  - name: whois
    engine: whois
    shortcut: whois
    categories: business
    disabled: false

  - name: crtsh
    engine: crtsh
    shortcut: crt
    categories: business
    disabled: false

  # Disable rate-limited search engines
  - name: brave
    disabled: true

  - name: duckduckgo
    disabled: true

  - name: google cse
    disabled: true

  - name: startpage
    disabled: true

  - name: qwant
    disabled: true

  # Disable engines that fail in containers
  - name: wikidata
    disabled: true

  - name: ahmia
    disabled: true

  - name: torch
    disabled: true
