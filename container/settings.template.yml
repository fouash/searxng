# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  # FREE PROXY CONFIGURATION
  # Set your Cloudflare Worker URL below to enable all external engines
  # Example: https://searxng-proxy.workers.dev/proxy?url=
  # Get proxy URL from DEPLOY_FREE_PROXY_GUIDE.md
  proxies:
    https: "https://searxng-proxy.workers.dev/proxy?url="
    http: "https://searxng-proxy.workers.dev/proxy?url="
  request_timeout: 8
  max_request_timeout: 15

ui:
  default_theme: simple

# PERFORMANCE OPTIMIZATION: Redis Caching
# Comment out if Redis not available
# Dramatically improves performance for repeated searches
redis:
  url: redis://localhost:6379/0

cache:
  default_ttl: 300

result_cache:
  expiration_time: 86400  # 24 hours

engines:
  # OFFLINE SAUDI COMPANY DISCOVERY
  # Local database of Saudi domains from Certificate Transparency logs
  # Works offline without any external API calls
  - name: saudi_companies_db
    disabled: false

  # === CORE SEARCH ENGINES ===
  - name: google
    disabled: false
    timeout: 8

  - name: bing
    disabled: false
    timeout: 8

  - name: duckduckgo
    disabled: false
    timeout: 8

  - name: qwant
    disabled: false
    timeout: 8

  - name: startpage
    disabled: false
    timeout: 8

  # === CHINESE SEARCH ENGINES ===
  - name: baidu
    disabled: false
    timeout: 8
    language: zh

  - name: sogou
    disabled: false
    timeout: 8
    language: zh

  # === RUSSIAN/CYRILLIC ENGINES ===
  - name: yandex
    disabled: false
    timeout: 8
    language: ru

  # === ASIAN REGIONAL ENGINES ===
  - name: naver
    disabled: false
    timeout: 8
    language: ko

  # === GENERAL REFERENCE ===
  - name: wikipedia
    disabled: false
    timeout: 8

  - name: wikidata
    disabled: false
    timeout: 8

  # === SPECIALIZED SEARCH ENGINES ===
  - name: github
    disabled: false
    timeout: 8

  - name: arxiv
    disabled: false
    timeout: 8

  - name: youtube
    disabled: false
    timeout: 8

  - name: reddit
    disabled: false
    timeout: 8

  - name: twitter
    disabled: false
    timeout: 8

  - name: mojeek
    disabled: false
    timeout: 8

  # === OPTIONAL: Additional Engines (uncomment to enable) ===
