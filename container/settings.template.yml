# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  default_lang: "ar-SA"
  safe_search: 0
  formats:
    - html
    - json
  languages:
    - "ar-SA"
    - "ar"
    - "en"
    - "all"

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

ui:
  default_locale: "ar"
  default_theme: simple

engines:
  # Search engines configured for Saudi Arabia region
  - name: google
    disabled: false
    params:
      gl: "sa"          # Google: geolocation = Saudi Arabia
      cr: "countrySA"   # Google: restrict to Saudi Arabia country
      # Language is controlled by default_lang: ar-SA setting

  - name: bing
    disabled: false
    params:
      cc: "SA"          # Bing: country code = Saudi Arabia
      # Market defaults to language setting (ar-SA)

  - name: yahoo
    disabled: false
    # Yahoo: language and region inherited from default settings

  # Disable rate-limited engines
  - name: brave
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: google cse
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true

  # Disable problematic engines
  - name: searx
    disabled: true
  - name: wikidata
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
  - name: whois
    disabled: true
  - name: crtsh
    disabled: true
