# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  default_lang: "ar-SA"
  safe_search: 0
  formats:
    - html
    - json
  languages:
    - "ar-SA"
    - "ar"
    - "en-US"
    - "all"

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

ui:
  default_locale: "ar"
  default_theme: simple

engines:
  # Domain discovery engines
  - name: crtsh
    engine: crtsh
    shortcut: crt
    categories: business
    disabled: false
    timeout: 10

  # Re-enable proven working engines
  - name: bing
    disabled: false
    timeout: 6

  - name: google
    disabled: false
    timeout: 6

  - name: yahoo
    disabled: false
    timeout: 6

  # Disable problematic engines
  - name: brave
    disabled: true

  - name: duckduckgo
    disabled: true

  - name: google cse
    disabled: true

  - name: startpage
    disabled: true

  - name: qwant
    disabled: true

  - name: whois
    disabled: true

  - name: wikipedia
    disabled: true

  - name: wikidata
    disabled: true

  - name: ahmia
    disabled: true

  - name: torch
    disabled: true
