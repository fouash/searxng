# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: false

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  default_lang: "ar-SA"
  safe_search: 0
  formats:
    - html
    - json
  languages:
    - "ar-SA"
    - "ar"
    - "en-US"
    - "all"

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

ui:
  default_locale: "ar"
  default_theme: simple

engines:
  # PRIORITY: Domain discovery engines (no rate-limits, optimized for company URL finding)
  - name: whois
    engine: whois
    shortcut: whois
    categories: business
    disabled: false
    # Saudi TLDs (.sa, .com.sa) get highest priority scores (1.0)

  - name: crtsh
    engine: crtsh
    shortcut: crt
    categories: business
    disabled: false
    # Certificate Transparency: Saudi domains ranked first

  # Rate-limited public engines — disabled to prevent errors
  # These engines block SearXNG due to high request volume
  - name: brave
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: google cse
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true

  # Fail at startup in containerized deployments
  - name: wikidata
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
