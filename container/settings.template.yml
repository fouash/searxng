# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 30.0
  max_request_timeout: 60.0

ui:
  default_theme: simple

engines:
  # NETWORK LIMITATION NOTICE:
  # The Render environment has restricted outbound network access.
  # All external search engines timeout due to proxy/firewall policies.
  #
  # Attempted:
  # - Google, Bing, Yahoo, DuckDuckGo: Rate-limited or blocked
  # - crt.sh (SSL Certificates): Timeout (network blocked)
  # - mojeek (Indie Search): Timeout (network blocked)
  # - All other engines: Network access restricted
  #
  # Solution: Deploy to environment with unrestricted outbound HTTPS,
  # or configure a VPN/proxy for external API access.

  # Disable all engines to avoid error messages
  - name: google
    disabled: true
  - name: bing
    disabled: true
  - name: yahoo
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: qwant
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: crtsh
    disabled: true
  - name: mojeek
    disabled: true
  - name: google cse
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
