# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  default_lang: "ar-SA"
  safe_search: 0
  formats:
    - html
    - json
  languages:
    - "ar-SA"
    - "ar"
    - "en-US"
    - "all"

outgoing:
  request_timeout: 6.0
  max_request_timeout: 10.0

ui:
  default_locale: "ar"
  default_theme: simple

engines:
  # PRIORITY: Domain discovery engines optimized for company URL finding
  # No rate-limiting, Saudi Arabia domain prioritization
  - name: whois
    engine: whois
    shortcut: whois
    categories: business
    disabled: false
    timeout: 15

  - name: crtsh
    engine: crtsh
    shortcut: crt
    categories: business
    disabled: false
    timeout: 10

  # Disable all rate-limited and problematic engines
  - name: brave
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: google
    disabled: true
  - name: google cse
    disabled: true
  - name: bing
    disabled: true
  - name: bing_images
    disabled: true
  - name: bing_news
    disabled: true
  - name: bing_videos
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true
  - name: mojeek
    disabled: true
  - name: marginalia
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
