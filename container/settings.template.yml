# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 30.0
  max_request_timeout: 60.0

ui:
  default_theme: simple

engines:
  # OFFLINE SAUDI COMPANY DISCOVERY (Primary)
  # Local database of Saudi domains from Certificate Transparency logs
  # Works offline without any external API calls
  # Download domains: python scripts/download_saudi_domains.py
  - name: saudi_companies_db
    disabled: false

  # ─────────────────────────────────────────────────────────────────
  # INTERNET ARCHIVE SEARCH ENGINES (Historical Web)
  # ─────────────────────────────────────────────────────────────────
  # These archive APIs are free and have generous rate limits
  # No authentication required
  # Provide access to 780+ billion archived web pages

  - name: Wayback Machine
    engine: wayback_machine
    shortcut: wa
    categories: web
    disabled: true
    timeout: 5

  - name: Common Crawl
    engine: common_crawl
    shortcut: cc
    categories: web
    disabled: true
    timeout: 5

  - name: Memento Archive
    engine: memento_archive
    shortcut: ma
    categories: web
    disabled: true
    timeout: 5

  - name: Archive.today
    engine: archive_today
    shortcut: ar
    categories: web
    disabled: true
    timeout: 5

  - name: Perma.cc
    engine: perma_cc
    shortcut: pc
    categories: web
    disabled: true
    timeout: 5

  - name: Arquivo.pt
    engine: arquivo_pt
    shortcut: pt
    categories: web
    disabled: true
    timeout: 5

  - name: UK Web Archive
    engine: uk_web_archive
    shortcut: uk
    categories: web
    disabled: true
    timeout: 5

  - name: Library of Congress Archives
    engine: loc_archives
    shortcut: loc
    categories: web
    disabled: true
    timeout: 5

  # ─────────────────────────────────────────────────────────────────
  # OPTIONAL: Certificate Transparency API (if outbound access available)
  # ─────────────────────────────────────────────────────────────────
  # Requires Render Standard tier or higher for outbound HTTPS
  - name: crtsh
    engine: crtsh
    shortcut: crt
    categories: business
    disabled: true
    # Enable if deploying on Render with outbound access

  # ─────────────────────────────────────────────────────────────────
  # NETWORK LIMITATION NOTICE:
  # ─────────────────────────────────────────────────────────────────
  # The Render free tier has restricted outbound network access.
  # Archive engines above DO NOT consume bandwidth (pre-archived data).
  # Traditional search engines (Google, Bing, etc.) timeout due to
  # proxy/firewall policies.
  #
  # For traditional external search engines:
  # - Upgrade Render to Standard tier ($7/month) for outbound access
  # - Follow: RENDER_STANDARD_UPGRADE_GUIDE.md
  #
  # For offline operation:
  # - Use saudi_companies_db (offline Saudi company search)
  # - Use archive engines above (780B+ historical pages)

  # Disable traditional external engines on free tier
  - name: google
    disabled: true
  - name: bing
    disabled: true
  - name: yahoo
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: qwant
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: whois
    disabled: true
  - name: mojeek
    disabled: true
  - name: google cse
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
