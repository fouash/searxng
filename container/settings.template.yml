# Read the documentation before extending the defaults:
# https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "ultrasecretkey"
  image_proxy: false
  limiter: false
  public_instance: false
  default_http_headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type, X-Requested-With"

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 30.0
  max_request_timeout: 60.0

ui:
  default_theme: simple

engines:
  # OFFLINE SAUDI COMPANY DISCOVERY (Primary)
  # Local database of Saudi domains from Certificate Transparency logs
  # Works offline without any external API calls
  # Download domains: python scripts/download_saudi_domains.py
  - name: saudi_companies_db
    disabled: false

  # OPTIONAL: Certificate Transparency API (if outbound access available)
  # Requires Render Standard tier or higher for outbound HTTPS
  - name: crtsh
    engine: crtsh
    shortcut: crt
    categories: business
    disabled: true
    # Enable if deploying on Render with outbound access

  # NETWORK LIMITATION NOTICE:
  # The Render environment has restricted outbound network access.
  # All external search engines timeout due to proxy/firewall policies.
  # For outbound access, upgrade Render to Standard tier or higher.
  # For offline-only operation, use saudi_companies_db engine above.

  # Disable all external engines to avoid error messages
  - name: google
    disabled: true
  - name: bing
    disabled: true
  - name: yahoo
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: qwant
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: whois
    disabled: true
  - name: mojeek
    disabled: true
  - name: google cse
    disabled: true
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
