<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SearXNG Keep-Alive</title>
    <style>
        body{font-family:Arial,sans-serif;background:#667eea;color:#333;padding:20px;text-align:center}
        .box{background:white;border-radius:8px;padding:20px;max-width:500px;margin:20px auto;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
        h1{margin:0;color:#667eea;font-size:24px}
        p{margin:10px 0;color:#666;font-size:14px}
        .status{background:#f0f0f0;padding:10px;border-radius:4px;margin:10px 0}
        .online{color:#22c55e;font-weight:bold}
        .time{font-size:12px;color:#999}
    </style>
</head>
<body>
    <div class="box">
        <h1>🔍 SearXNG Keep-Alive</h1>
        <p>Instance Status: <span class="online">● Online</span></p>
        <div class="status">
            <p><strong>Instance is alive and responding</strong></p>
            <p class="time">Last ping: just now</p>
            <p class="time">Cron keeps this page alive every 10 minutes</p>
        </div>
        <p>Free tier prevents spin-down after 15 min inactivity</p>
    </div>
</body>
</html>
